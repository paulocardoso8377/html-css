<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro" method="get" autocomplete="on">
        <label for="iano">Qual sua idade? </label>
        <input type="number" name="ano" id="iano" oninput="calcular()">

        <label for="iidade">Sua idade é:</label>
        <output id="iidade">:</output>
    </form>
    <script>
        let atual =  new Date().getFullYear
        iidade.innerHTML = Number(atual.value) - Number(iano.value)
    </script>
</body>
</html>
